<div class="filter-header">
  <span>Filter</span>
  <span class="filter-icon">▼</span>
</div>
<div class="filter-body">
  <p class="filter-label">
    Spiciness: {{ filter.spiciness === 0 ? 'Not Chosen' : filter.spiciness }}
  </p>
  <input
    type="range" min="0" max="4"
    name="spiciness"
    [(ngModel)]="filter.spiciness"
    (input)="onChange()"
    class="slider red-slider"
  >

  <div class="checkbox-group">
    <label class="custom-checkbox gray-checkbox">
      <input type="checkbox" name="noNuts" [(ngModel)]="filter.noNuts" (change)="onChange()">
      <span>No Nuts</span>
    </label>
    <label class="custom-checkbox gray-checkbox">
      <input type="checkbox" name="vegetarianOnly" [(ngModel)]="filter.vegetarianOnly" (change)="onChange()">
      <span>Vegetarian Only</span>
    </label>
  </div>

  <button class="btn-reset" (click)="onReset()">RESET</button>
  <button class="btn-apply" (click)="onChange()">APPLY FILTER</button>
</div>
