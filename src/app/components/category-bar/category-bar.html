<button (click)="select('all')" 
        class="category-btn" 
        [class.active]="selectedId === null">
  All
</button>

@for (category of categories; track category.id) {
  <button (click)="select(category.id)" 
          class="category-btn" 
          [class.active]="selectedId === category.id">
    {{ category.name }}
  </button>
}
