<div class="categories-container">
  <button (click)="select('all')" class="category-btn" [class.active]="selectedId === 'all'">
    All
  </button>
  @for (cat of categories; track cat.id) {
    <button (click)="select(cat.id)" class="category-btn" [class.active]="selectedId === cat.id">
      {{ cat.name }}
    </button>
  }
</div>
